<!-- Contact Section -->
<section id="contact">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2>联系方式</h2>
        <hr class="star-primary">
      </div>
    </div>
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2">
        <form action="//formspree.io/{{ site.email }}" method="POST" name="sentMessage" id="contactForm" novalidate>
          <div class="row control-group">
            <div class="form-group col-xs-12 floating-label-form-group controls">
              <label for="name">姓名</label>
              <input type="text" name="name" class="form-control" placeholder="姓名" id="name" required
                data-validation-required-message="请输入您的姓名">
              <p class="help-block text-danger"></p>
            </div>
          </div>
          <div class="row control-group">
            <div class="form-group col-xs-12 floating-label-form-group controls">
              <label for="email">邮箱地址</label>
              <input type="email" name="_replyto" class="form-control" placeholder="邮箱地址" id="email" required
                data-validation-required-message="请输入您的邮箱地址">
              <p class="help-block text-danger"></p>
            </div>
          </div>
          <div>
            <input type="hidden" name="_subject" value="网站新消息!">
            <input type="text" name="_gotcha" style="display:none" />
          </div>
          <div class="row control-group">
            <div class="form-group col-xs-12 floating-label-form-group controls">
              <label for="message">留言内容</label>
              <textarea rows="5" name="message" class="form-control" placeholder="留言内容" id="message" required
                data-validation-required-message="请输入留言内容"></textarea>
              <p class="help-block text-danger"></p>
            </div>
          </div>
          <br>
          <div id="success"></div>
          <div class="row">
            <div class="form-group col-xs-12">
              <button type="submit" class="btn btn-success btn-lg">发送</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
